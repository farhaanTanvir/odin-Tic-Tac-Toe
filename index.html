<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Loading Poppins, Montserrat, Lexend, and Orbitron in Bold weights -->
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700;800&family=Montserrat:wght@800;900&family=Orbitron:wght@700;900&family=Poppins:wght@700;800&display=swap" rel="stylesheet">

</head>
<body>
    <div id="gameboard">
        <div class="cell r1-1" data-row="1" data-column="1"></div>
        <div class="cell r1-2" data-row="1" data-column="2"></div>
        <div class="cell r1-3" data-row="1" data-column="3"></div>
        <div class="cell r2-1" data-row="2" data-column="1"></div>
        <div class="cell r2-2" data-row="2" data-column="2"></div>
        <div class="cell r2-3" data-row="2" data-column="3"></div>
        <div class="cell r3-1" data-row="3" data-column="1"></div>
        <div class="cell r3-2" data-row="3" data-column="2"></div>
        <div class="cell r3-3" data-row="3" data-column="3"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
